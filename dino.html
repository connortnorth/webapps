<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🦖 Chrome Dino Game</title>
    <meta name="description" content="Avoid the incoming cactuses. Tap spacebar or click to jump!">
    <style>
        body {
            margin: 0;
            padding: 10px;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fff;
        }
        #gameCanvas {
            background: #fdfdfd;
            border: 4px solid #111;
            border-radius: 12px;
            display: block;
            margin: 0 auto 15px auto;
            max-width: 100%;
            box-shadow: 4px 4px 0px #111;
        }
        .game-score {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 15px;
        }
        .action-btn {
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: 800;
            background: #4ade80;
            border: 3px solid #111;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #111;
        }
        .action-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #111;
        }
        .action-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #111;
        }
    </style>
</head>
<body>

<div class="game-score">Score: <span id="scoreVal">0</span></div>
<canvas id="gameCanvas" width="640" height="200"></canvas>
<p style="margin-bottom: 15px; color:#555; font-size: 0.95rem;">Press <strong>Spacebar</strong> or <strong>Click/Tap Canvas</strong> to Jump.</p>
<button class="action-btn" onclick="startDino()">🔄 Restart Game</button>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let gameInterval;
    let isPlaying = false;
    let score = 0;
    let gameSpeed = 5;
    let frameCount = 0;

    const GROUND_Y = 184; // The exact pixel height of the floor line

    // Dino properties
    let dino = {
        x: 60,
        y: 0,
        width: 30,
        height: 36,
        vy: 0,
        gravity: 0.6,
        jumpForce: -11,
        isGrounded: false
    };

    // Obstacle array
    let obstacles = [];

    function startDino() {
        if (gameInterval) clearInterval(gameInterval);

        isPlaying = true;
        score = 0;
        gameSpeed = 5;
        frameCount = 0;
        obstacles = [];

        // Spawn Dino directly on the ground
        dino.y = GROUND_Y - dino.height;
        dino.vy = 0;
        dino.isGrounded = true;

        document.getElementById('scoreVal').innerText = score;
        gameInterval = setInterval(updateDinoGame, 1000 / 60); // 60 FPS
    }

    function stopDino() {
        isPlaying = false;
        clearInterval(gameInterval);
    }

    function spawnObstacle() {
        // Only attempt to spawn every 60 frames to prevent tight clusters
        if (frameCount % 80 === 0) {
            if (Math.random() < 0.7) {
                obstacles.push({
                    x: canvas.width,
                    y: GROUND_Y - 40, // Sits exactly on the ground line
                    width: 24,
                    height: 40
                });
            }
        }
    }

    function drawDinosaur(x, y, isGrounded, frames) {
        ctx.fillStyle = '#15803d'; // Retro Green
        ctx.fillRect(x, y + 12, 6, 12);
        ctx.fillRect(x + 4, y + 10, 18, 16);
        ctx.fillRect(x + 14, y, 14, 12);
        ctx.fillRect(x + 22, y + 4, 8, 8);
        ctx.fillStyle = '#166534';
        ctx.fillRect(x + 20, y + 14, 4, 4);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(x + 18, y + 2, 4, 4);
        ctx.fillStyle = '#000000';
        ctx.fillRect(x + 18, y + 2, 2, 2);

        // Running legs animation logic
        ctx.fillStyle = '#111111';
        let legToggle = Math.floor(frames / 6) % 2 === 0;
        if (!isGrounded) {
            ctx.fillRect(x + 6, y + 26, 4, 6);
            ctx.fillRect(x + 14, y + 26, 4, 6);
        } else {
            ctx.fillRect(x + 6, y + 26, 4, legToggle ? 10 : 6);
            ctx.fillRect(x + 14, y + 26, 4, legToggle ? 6 : 10);
        }
    }

    function drawCactus(x, y, width, height) {
        // Draw Main Stem
        ctx.fillStyle = '#1e3a1e'; // Dark Outlines
        ctx.fillRect(x, y, width, height);
        ctx.fillStyle = '#22c55e'; // Cactus Green Center
        ctx.fillRect(x + 2, y + 2, width - 4, height - 2);

        // Left Branch Arm
        ctx.fillStyle = '#1e3a1e';
        ctx.fillRect(x - 6, y + 10, 8, 14);
        ctx.fillRect(x - 6, y + 10, 6, 6);
        ctx.fillStyle = '#22c55e';
        ctx.fillRect(x - 4, y + 12, 4, 12);

        // Right Branch Arm
        ctx.fillStyle = '#1e3a1e';
        ctx.fillRect(x + width - 2, y + 14, 8, 12);
        ctx.fillRect(x + width, y + 14, 6, 6);
        ctx.fillStyle = '#22c55e';
        ctx.fillRect(x + width, y + 16, 4, 10);

        // Green Inner Rib detail line
        ctx.fillStyle = '#166534';
        ctx.fillRect(x + (width / 2) - 1, y + 4, 2, height - 8);
    }

    function updateDinoGame() {
        frameCount++;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Draw Horizon Floor Line
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(0, GROUND_Y);
        ctx.lineTo(canvas.width, GROUND_Y);
        ctx.stroke();

        // 2. Physics: Handle Dino Jump Gravity
        dino.vy += dino.gravity;
        dino.y += dino.vy;

        // Ground Stop Check
        if (dino.y >= GROUND_Y - dino.height) {
            dino.y = GROUND_Y - dino.height;
            dino.vy = 0;
            dino.isGrounded = true;
        }

        // Draw the Dinosaur
        drawDinosaur(dino.x, dino.y, dino.isGrounded, frameCount);

        // 3. Spawning & Obstacle Handling Loop
        spawnObstacle();

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            obs.x -= gameSpeed; // Move left toward player

            // Render the unified vector Cactus
            drawCactus(obs.x, obs.y, obs.width, obs.height);

            // 4. Fixed AABB Hitbox Collision Check
            if (
                dino.x < obs.x + obs.width &&
                dino.x + dino.width > obs.x &&
                dino.y < obs.y + obs.height &&
                dino.y + dino.height > obs.y
            ) {
                stopDino();

                // Game Over Screen Overlay
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#ff6b6b';
                ctx.font = 'bold 28px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('💥 GAME OVER', canvas.width / 2, canvas.height / 2);
                return;
            }

            // Delete cactus when it leaves screen and grant points
            if (obs.x + obs.width < 0) {
                obstacles.splice(i, 1);
                score++;
                document.getElementById('scoreVal').innerText = score;

                // Gradually speed up game dynamically as score increases
                if (score % 4 === 0 && gameSpeed < 12) {
                    gameSpeed += 0.5;
                }
            }
        }
    }

    function triggerJump() {
        if (dino.isGrounded && isPlaying) {
            dino.vy = dino.jumpForce;
            dino.isGrounded = false;
        }
    }

    // Event Listeners for controls
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault(); // Prevents page shifting down
            triggerJump();
        }
    });
    canvas.addEventListener('mousedown', triggerJump);
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        triggerJump();
    });

    // Run automatically on open
    startDino();
</script>
</body>
</html>
