<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            background: #fff;
        }
        .calc-container {
            width: 100%;
            max-width: 320px;
            border: 4px solid #111;
            border-radius: 16px;
            padding: 20px;
            background: #fff;
            box-shadow: 4px 4px 0px #111;
        }
        #calc-display {
            width: 100%;
            height: 60px;
            border: 3px solid #111;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1.8rem;
            text-align: right;
            padding: 10px;
            background: #f9f9f9;
            font-weight: bold;
            box-sizing: border-box;
        }
        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        .calc-btn {
            padding: 18px;
            font-size: 1.3rem;
            font-weight: bold;
            border: 3px solid #111;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            box-shadow: 3px 3px 0px #111;
        }
        .calc-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #111;
        }
        .calc-btn.operator {
            background: #ffe600;
        }
        .calc-btn.clear {
            background: #ff6b6b;
            color: white;
        }
    </style>
</head>
<body>

<div class="calc-container">
    <input type="text" id="calc-display" readonly>
    <div class="calc-buttons">
        <button class="calc-btn clear" onclick="clearCalc()">C</button>
        <button class="calc-btn operator" onclick="appendCalc('/')">/</button>
        <button class="calc-btn operator" onclick="appendCalc('*')">*</button>
        <button class="calc-btn operator" onclick="appendCalc('-')">-</button>

        <button class="calc-btn" onclick="appendCalc('7')">7</button>
        <button class="calc-btn" onclick="appendCalc('8')">8</button>
        <button class="calc-btn" onclick="appendCalc('9')">9</button>
        <button class="calc-btn operator" onclick="appendCalc('+')">+</button>

        <button class="calc-btn" onclick="appendCalc('4')">4</button>
        <button class="calc-btn" onclick="appendCalc('5')">5</button>
        <button class="calc-btn" onclick="appendCalc('6')">6</button>
        <button class="calc-btn" style="grid-row: span 2; height: 100%; background: #4ade80;" onclick="calculateResult()">=</button>

        <button class="calc-btn" onclick="appendCalc('1')">1</button>
        <button class="calc-btn" onclick="appendCalc('2')">2</button>
        <button class="calc-btn" onclick="appendCalc('3')">3</button>

        <button class="calc-btn" style="grid-column: span 2;" onclick="appendCalc('0')">0</button>
        <button class="calc-btn" onclick="appendCalc('.')">.</button>
    </div>
</div>

<script>
    const display = document.getElementById('calc-display');
    function appendCalc(val) { display.value += val; }
    function clearCalc() { display.value = ''; }
    function calculateResult() {
        try {
            display.value = Function('"use strict";return (' + display.value + ')')();
        } catch (e) {
            display.value = 'Error';
        }
    }
</script>
</body>
</html>
