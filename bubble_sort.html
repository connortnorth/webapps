<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Visualizer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a1a;
            color: #ffffff;
        }
        #container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 300px;
            width: 600px;
            background-color: #2a2a2a;
            border: 2px solid #444;
            padding: 10px;
            border-radius: 8px;
        }
        .bar {
            width: 20px;
            margin: 0 2px;
            background-color: #3498db;
            transition: background-color 0.1s;
        }
        .comparing {
            background-color: #e74c3c !important;
        }
        .sorted {
            background-color: #2ecc71 !important;
        }
        .controls {
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #444;
            color: white;
            border: none;
            border-radius: 4px;
            margin: 0 5px;
        }
        button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

<h1>Bubble Sort Visualizer</h1>
<div id="container"></div>

<div class="controls">
    <button onclick="generateArray()">New Array</button>
    <button onclick="startSort()">Sort</button>
</div>

<script>
    const container = document.getElementById("container");
    let array = [];
    const ARRAY_SIZE = 20;
    const ANIMATION_SPEED_MS = 100;

    // Generate a random array and render HTML bars
    function generateArray() {
        container.innerHTML = "";
        array = [];
        for (let i = 0; i < ARRAY_SIZE; i++) {
            const value = Math.floor(Math.random() * 250) + 10;
            array.push(value);

            const bar = document.createElement("div");
            bar.classList.add("bar");
            bar.style.height = `${value}px`;
            container.appendChild(bar);
        }
    }

    // Helper promise to create an animation delay
    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    // Core Bubble Sort logic paired with DOM manipulation
    async function bubbleSort() {
        const bars = container.children;

        for (let i = 0; i < array.length; i++) {
            for (let j = 0; j < array.length - i - 1; j++) {
                // Highlight the two bars being compared
                bars[j].classList.add("comparing");
                bars[j + 1].classList.add("comparing");

                await sleep(ANIMATION_SPEED_MS);

                if (array[j] > array[j + 1]) {
                    // Swap data values
                    let temp = array[j];
                    array[j] = array[j + 1];
                    array[j + 1] = temp;

                    // Swap visual bar heights immediately
                    bars[j].style.height = `${array[j]}px`;
                    bars[j + 1].style.height = `${array[j + 1]}px`;
                }

                // Remove comparison color highlight
                bars[j].classList.remove("comparing");
                bars[j + 1].classList.remove("comparing");
            }
            // Mark the last element of this pass as permanently sorted
            bars[array.length - i - 1].classList.add("sorted");
        }
    }

    function startSort() {
        bubbleSort();
    }

    // Initial setup on page load
    generateArray();
</script>
</body>
</html>
