<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Radix Sort</title>
</head>
<body>
<script>
    // 1. Generate random numbers
    let inputArray = [];
    for (let i = 0; i < 10; i++) {
        inputArray.push(Math.floor(Math.random() * 100));
    }
    console.log("Original Array:", inputArray);

    // 2. Find the maximum number of digits correctly
    let maxNum = Math.max(...inputArray);
    let longestLength = maxNum.toString().length;

    let currentDigit = 0;

    // 3. Main Radix Sort loop
    for (let i = 0; i < longestLength; i++) {
        // Create 10 empty buckets (0-9)
        let buckets = Array.from({ length: 10 }, () => []);

        // Move numbers into the correct bucket based on the current digit
        for (let j = 0; j < inputArray.length; j++) {
            let lastDigit = Math.floor(inputArray[j] / (10 ** currentDigit)) % 10;
            buckets[lastDigit].push(inputArray[j]);
        }

        // Flatten the buckets back into the inputArray
        inputArray = buckets.flat();

        currentDigit++;
        console.log(`Pass ${currentDigit}:`, inputArray);
    }

    alert("Sorted Array: " + inputArray);
</script>
</body>
</html>
